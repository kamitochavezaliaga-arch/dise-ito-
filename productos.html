<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Ferretería Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Ferretería<span>Pro</span></div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html" class="active">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="productos-page">
            <h2 class="titulo-seccion">Catálogo de Herramientas</h2>
            
            <div class="filtros">
                <button class="btn-filtro active" data-categoria="Todos">Todos</button>
                <button class="btn-filtro" data-categoria="Manuales">Manuales</button>
                <button class="btn-filtro" data-categoria="Eléctricas">Eléctricas</button>
            </div>

            <div class="grid-productos-alineado" id="lista-productos-completa">
                </div>
        </section>
    </main>

    <div id="modal-info" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="" alt="Imagen del producto">
            <h2 id="modal-titulo"></h2>
            <p id="modal-desc"></p>
            <div class="modal-footer">
                <button class="btn-agregar" onclick="document.getElementById('modal-info').style.display='none'">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
